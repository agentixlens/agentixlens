# ============================================================
# AgentixLens — Netlify Config
# Serves ONLY index.html + dashboard.html from root.
# The backend/ folder is ignored completely by Netlify.
# ============================================================

[build]
  publish = "."     # serve from repo root
  command = ""      # NO build step — pure static HTML
  ignore  = "exit 0"

[build.environment]
  PYTHON_VERSION = ""
  NODE_VERSION   = ""

# Block direct access to backend/sdk source files
[[redirects]]
  from   = "/backend/*"
  to     = "/404"
  status = 404

[[redirects]]
  from   = "/sdk/*"
  to     = "/404"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
